<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Exercício</title>
    <style>
      section {
        border-color: black;
        border-style: solid;
      }

      .title {
        text-align: center;
      }

      .main-content {
        background-color: yellow;
      }

      .main-content .center-content {
        background-color: red;
        width: 50%;
        margin-left: auto;
        margin-right: auto;
      }

      .main-content .center-content p {
        font-style: italic;
      }

      .main-content .left-content {
        background-color: green;
        width: 60%;
        margin-left: 0;
        margin-right: auto;
      }

      .main-content .left-content .small-image {
        display: block;
        margin-left: auto;
        margin-right: auto;
        border-radius: 100%;
      }

      .main-content .right-content {
        background-color: blue;
        width: 60%;
        margin-left: auto;
        margin-right: 0;
      }

      .main-content .description {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <script>
      let getBody = document.querySelector("body");
      let createH1 = document.createElement("h1");
      createH1.className = "title";
      createH1.innerText = "TrybeTrip - Agência de Viagens";
      getBody.appendChild(createH1);

      let createMain = document.createElement("main");
      createMain.className = "main-content";
      getBody.appendChild(createMain);

      let createSectionToMain = document.createElement("section");
      createSectionToMain.className = "center-content";
      let getMain = document.querySelector(".main-content");
      getMain.appendChild(createSectionToMain);

      let createParagrafoForSection = document.createElement("p");
      createParagrafoForSection.innerText = "Olá, eu sou o parágrafo!";
      createSectionToMain.appendChild(createParagrafoForSection);

      let createLeftSectionToMain = document.createElement("section");
      createLeftSectionToMain.className = "left-content";
      getMain.appendChild(createLeftSectionToMain);

      let createRightSectionToMain = document.createElement("section");
      createRightSectionToMain.className = "right-content";
      getMain.appendChild(createRightSectionToMain);

      let createImageForLeftSection = document.createElement("img");
      createImageForLeftSection.src = "https://picsum.photos/200";
      createImageForLeftSection.className = "small-image";
      createLeftSectionToMain.appendChild(createImageForLeftSection);

      let createUlForRightSection = document.createElement("ul");
      let arrayNumbers = ["um", "dois", "três", "quatro", "cinco", "seis", "sete", "oito", "nove", "dez"];
      for (let index = 0; index < arrayNumbers.length; index += 1) {        
        let createLiForUlRightSection = document.createElement("li");
        createLiForUlRightSection.innerText = arrayNumbers[index];    
        createUlForRightSection.appendChild(createLiForUlRightSection);
      }
      createRightSectionToMain.appendChild(createUlForRightSection);

      for (let index = 0; index < 3; index += 1) {
        let createH3ForMain = document.createElement("h3");
        createH3ForMain.className = "description";
        getMain.appendChild(createH3ForMain);
      }

      //Exclui left-content section
      getMain.removeChild(createLeftSectionToMain);

      //Centraliza a section right-content
      createRightSectionToMain.style.marginRight = "auto";

      //Muda cor do elemento pai de center-content
      createSectionToMain.parentNode.style.backgroundColor = "green";

      //Remove itens 9 e dez da ul de duas formas conhecidas
      let getLastChildOfUl = createUlForRightSection.lastElementChild;
      let getBeforeLastChildOfUl = getLastChildOfUl.previousElementSibling;
      createUlForRightSection.removeChild(getBeforeLastChildOfUl); //forma de remover elementos filhos a partir de elementos pai
      getLastChildOfUl.remove(); //Uma das formas de remover elementos html. Aqui excluo o ultimo "por ultimo" para não perder o penultimo alvo, pois esse ultimo serve de base para encontrar o penultimo.
    </script>
  </body>
</html>
