<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <title>HTML</title>
    <style>
        h1 {
            color: orange;
            font-size: 65px;
            font-family: sans-serif;
        }

        body {
            background-color: bisque;
            font-size: 16px;
        }

        p {
            font-weight: 600;
            font-size: 3em;
        }

        #paragrafo {
            color: green;
        }

        .itens {
            color: blue;
            background-color: aliceblue;
            font-style: italic;
            line-height: 2;
            text-align: center;
            text-decoration: underline;
        }
    </style>
  </head>
  <body>
    <h1>Frutas</h1>
    <p id="paragrafo">Qual é a sua fruta favorita?</p>
    <ul class="itens">
      <li>Maçã</li>
      <li>Banana</li>
      <li>Goiaba</li>
    </ul>
  </body>
</html>
