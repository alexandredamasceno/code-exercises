<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <title>HTML</title>
    <style>
        h1 {
            color: orange;
            font-size: 65px;
        }

        body {
            background-color: bisque;
        }

        #paragrafo {
            color: green;
        }

        .itens {
            color: blue;
            background-color: aliceblue;
        }
    </style>
  </head>
  <body>
    <h1>Frutas</h1>
    <p id="paragrafo" class="itens">Qual é a sua fruta favorita?</p>
    <ul class="itens">
      <li>Maçã</li>
      <li>Banana</li>
      <li>Goiaba</li>
    </ul>
  </body>
</html>
