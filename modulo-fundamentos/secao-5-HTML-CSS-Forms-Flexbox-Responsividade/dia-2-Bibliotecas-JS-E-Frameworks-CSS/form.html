<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/form.css" type="text/css">
    <title>Formulário - TrybeTravel</title>
</head>

<body>
    <main>
        <h1 id="title" class="bg-success p-2 text-white">Formulário Trybe Travel</h1>

        <form id="main-form" class="bg-success p-2 text-white bg-opacity-75">
            <fieldset>
                <section>
                    <label for="fullName" class="form-label">Nome Completo:</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Digite seu nome completo"
                        maxlength="40" minlength="10" required class="form-control" />
                </section>
                <br>
                <section>
                    <label for="email" class="form-label">Endereço de E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" maxlength="50"
                        minlength="10" required class="form-control" />
                </section>
                <br>
                <section>
                    <label for="destination1">Cidade</label>
                    <input type="radio" id="destination1" className="radios" name="destinations" value="Cidade" required
                        class="form-check-input" />
                    <label for="destination2">Campo</label>
                    <input type="radio" id="destination2" className="radios" name="destinations" value="Campo" required
                        class="form-check-input" />
                    <label for="destination3">Praia</label>
                    <input type="radio" id="destination3" className="radios" name="destinations" value="Praia" required
                        class="form-check-input" />
                    <label for="destination4">Montanhas</label>
                    <input type="radio" id="destination4" className="radios" name="destinations" value="Montanhas"
                        required class="form-check-input" />
                </section>
                <br>
                <section>
                    <label for="question">
                        Por que você deveria ser a pessoa desenvolvedora a ganhar o concurso
                        TrybeTravel ?
                    </label>
                    <textarea name="why" id="question" cols="60" rows="10"
                        placeholder="Digite sua resposta vencedora aqui" maxlength="500" class="form-control">
                    </textarea>
                </section>
                <br>
                <section>
                    <label for="date">Qual a melhor data para realizar sua viagem?</label>
                    <input type="date" id="date" class="form-control" />
                </section>
                <br />
                <section>
                    <label for="promo">Gostaria de receber outras incríveis oportunidades oferecidas pela Trybe.
                    </label>
                    <input type="checkbox" name="promo" id="promo" class="form-check-input" />
                </section>
                <br />
                <section>
                    <label for="agreement">Concordo que imagens de minhas férias poderão ser usadas na divulgação de
                        concursos
                        futuros.
                    </label>
                    <input type="checkbox" name="agreement" id="agreement" required class="form-check-input" />
                </section>
            </fieldset>
            <br>
            <section class="d-grid gap-2">
                <button type="submit" id="submit-btn" class="btn btn-primary form-control">Enviar</button>
                <button type="reset" id="clear-btn" class="btn btn-dark form-control">Limpar</button>
            </section>
        </form>
    </main>
</body>

</html>
